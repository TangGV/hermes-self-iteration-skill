# Hermes-managed Cursor compatibility bridge for direct CPA.
# Cursor Base URL: https://api.aigcfast.com/cursor/v1
# Upstream: cursor-cpa-compat on 127.0.0.1:8326 -> CLIProxyAPI/CPA on 127.0.0.1:8317

location = /cursor {
    return 302 /cursor/;
}

location ^~ /cursor/ {
    proxy_pass http://127.0.0.1:8326/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header REMOTE-HOST $remote_addr;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "";
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Port $server_port;
    proxy_http_version 1.1;
    proxy_buffering off;
    proxy_request_buffering off;
    proxy_cache off;
    gzip off;
    chunked_transfer_encoding on;
    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;
    add_header X-Cursor-CPA-Compat-Proxy direct-cpa always;
    add_header X-Accel-Buffering no always;
}
