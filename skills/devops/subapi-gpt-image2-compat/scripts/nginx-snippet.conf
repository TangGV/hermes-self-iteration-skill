    # gpt-image-2: intercept wrong /v1/responses and /v1/chat/completions -> image compat sidecar
    location = /v1/responses {
        proxy_pass http://127.0.0.1:8328;
        include_subapi_image_proxy;
    }
    location = /v1/chat/completions {
        proxy_pass http://127.0.0.1:8328;
        include_subapi_image_proxy;
    }

    # Public PNG artifacts (sidecar GET)
    location ^~ /subapi-image-artifacts/ {
        proxy_pass http://127.0.0.1:8328;
        proxy_set_header Host $host;
        proxy_http_version 1.1;
        proxy_buffering off;
        add_header Cache-Control "public, max-age=86400" always;
    }